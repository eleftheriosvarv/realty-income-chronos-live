name: Realtime O Chronos-2

on:
  schedule:
    - cron: "2/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-forecast:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run forecast script
        run: python run_realtime_o.py

      - name: Upload state files as artifact
        uses: actions/upload-artifact@v4
        with:
          name: realtime-o-output
          path: realtime_o_chronos2_state
          if-no-files-found: warn

      - name: Commit updated state back to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add realtime_o_chronos2_state
          git diff --cached --quiet || git commit -m "Update realtime forecasting state"
          git push
